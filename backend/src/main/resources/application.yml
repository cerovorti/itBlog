server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    url: jdbc:mysql://localhost:3306/demo_album?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  global-config:
    db-config:
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true
    # log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 需要调试SQL时取消注释

app:
  jwt:
    secret: ${JWT_SECRET:it-blog-jwt-secret-key-2026-must-be-at-least-256-bits-long!!}
    expiration: 86400000  # 24小时 (毫秒)
    remember-me-expiration: 604800000  # 7天 (毫秒)

